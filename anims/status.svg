<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" style="background: #0d1117">
  <style>
    /* Background grid lines */
    .bg-edge { stroke: #21262d; stroke-width: 1; stroke-dasharray: 4 4; }
    
    /* The active elements that will pulse */
    .fire { 
      stroke: #21262d; fill: #21262d; stroke-width: 1.5;
      /* 2.5 second total loop, running forever */
      animation: pulse 2.5s infinite; 
    }

    /* The rapid flash: it spikes bright blue at 5%, then hides for the rest of the 2.5s loop */
    @keyframes pulse {
      0%, 15%, 100% { stroke: #21262d; fill: #21262d; filter: none; }
      5% { stroke: #58a6ff; fill: #58a6ff; filter: drop-shadow(0 0 4px #58a6ff); }
    }
    
    .label { fill: #8b949e; font-family: monospace; font-size: 10px; font-weight: bold; }
  </style>

  <path class="bg-edge" d="M40,100 L80,60 L120,80 L160,40 L200,90 L240,50 L280,100 L320,60 L360,110" />
  <path class="bg-edge" d="M40,100 L80,140 L120,120 L160,160 L200,110 L240,150 L280,100 L320,140 L360,110" />
  <path class="bg-edge" d="M80,60 L80,140 M120,80 L120,120 M160,40 L160,160 M200,90 L200,110 M240,50 L240,150 M280,100 L280,150 M320,60 L320,140" />
  
  <g>
    <circle cx="40" cy="100" r="3" class="fire" style="animation-delay: 0.0s;" />
    <line x1="40" y1="100" x2="80" y2="60" class="fire" style="animation-delay: 0.1s;" />
    <circle cx="80" cy="60" r="3" class="fire" style="animation-delay: 0.2s;" />
    <line x1="80" y1="60" x2="120" y2="80" class="fire" style="animation-delay: 0.3s;" />
    <circle cx="120" cy="80" r="3" class="fire" style="animation-delay: 0.4s;" />
    <line x1="120" y1="80" x2="160" y2="40" class="fire" style="animation-delay: 0.5s;" />
    <circle cx="160" cy="40" r="3" class="fire" style="animation-delay: 0.6s;" />
    <line x1="160" y1="40" x2="200" y2="90" class="fire" style="animation-delay: 0.7s;" />
    <circle cx="200" cy="90" r="3" class="fire" style="animation-delay: 0.8s;" />

    <circle cx="40" cy="100" r="3" class="fire" style="animation-delay: 0.3s;" />
    <line x1="40" y1="100" x2="80" y2="140" class="fire" style="animation-delay: 0.4s;" />
    <circle cx="80" cy="140" r="3" class="fire" style="animation-delay: 0.5s;" />
    <line x1="80" y1="140" x2="120" y2="120" class="fire" style="animation-delay: 0.6s;" />
    <circle cx="120" cy="120" r="3" class="fire" style="animation-delay: 0.7s;" />
    <line x1="120" y1="120" x2="160" y2="160" class="fire" style="animation-delay: 0.8s;" />
    <circle cx="160" cy="160" r="3" class="fire" style="animation-delay: 0.9s;" />
    <line x1="160" y1="160" x2="200" y2="110" class="fire" style="animation-delay: 1.0s;" />
    <circle cx="200" cy="110" r="3" class="fire" style="animation-delay: 1.1s;" />
    
    <line x1="200" y1="110" x2="240" y2="50" class="fire" style="animation-delay: 1.2s;" />
    <circle cx="240" cy="50" r="3" class="fire" style="animation-delay: 1.3s;" />
    <line x1="240" y1="50" x2="280" y2="100" class="fire" style="animation-delay: 1.4s;" />
    <circle cx="280" cy="100" r="3" class="fire" style="animation-delay: 1.5s;" />
    
    <line x1="280" y1="100" x2="320" y2="60" class="fire" style="animation-delay: 1.6s;" />
    <circle cx="320" cy="60" r="3" class="fire" style="animation-delay: 1.7s;" />
    <line x1="320" y1="60" x2="360" y2="110" class="fire" style="animation-delay: 1.8s;" />
    <circle cx="360" cy="110" r="3" class="fire" style="animation-delay: 1.9s;" />

    <line x1="280" y1="100" x2="320" y2="140" class="fire" style="animation-delay: 1.6s;" />
    <circle cx="320" cy="140" r="3" class="fire" style="animation-delay: 1.7s;" />
    
    <line x1="80" y1="60" x2="80" y2="140" class="fire" style="animation-delay: 0.4s;" />
    <line x1="200" y1="90" x2="200" y2="110" class="fire" style="animation-delay: 0.9s;" />
  </g>

  <text x="10" y="20" class="label" fill="#58a6ff">GRAPH_PERCOLATION_V2</text>
  <text x="310" y="190" class="label">STATUS: ACTIVE</text>
  <text x="10" y="190" class="label" fill="#3fb950">THREADS: 16</text>
</svg>